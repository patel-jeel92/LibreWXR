# Multi-worker tile-server split.  Two services backed by the same image:
#   pipeline  — single asyncio process that fetches all radar / NWP / cloud
#               data and writes a state.json snapshot under /data/cache
#               after every fetch cycle.
#   librewxr  — N uvicorn worker processes that memmap the same files and
#               refresh their in-memory stores when state.json changes.  No
#               fetcher, no NWP HTTP clients — only tile rendering.
#
# Why this exists: a single uvicorn worker pegs at 1 core because of the
# Python GIL.  Splitting fetch from render lets the renderer scale across
# real cores via process workers, while every worker shares the same
# memmap-backed page cache (no per-worker copy of the radar / NWP data).
#
# Deploy:
#   docker compose -f docker-compose.multiworker.yml up --build -d
#
# Defaults below target an 80-core / 32 GB rack.  Tune LIBREWXR_WORKERS
# and the memory limits down for smaller hardware.  See .env.example for
# the full set of LIBREWXR_* knobs.

services:
  pipeline:
    build: .
    command: ["python", "-m", "librewxr.data_pipeline"]
    env_file:
      - .env
    environment:
      LIBREWXR_CACHE_DIR: /data/cache
      # Higher concurrency cap on a fat box brings cycle wall-time close
      # to the slowest single source (≈100 s for DMI DINI).  Each grid
      # holds ~600 MB during decode, so 8 × ~600 MB ≈ peak 5 GB of
      # transient working set on top of resident state.
      LIBREWXR_NWP_FETCH_CONCURRENCY: "8"
    volumes:
      - librewxr-cache:/data/cache
      # earthkit-regrid downloads ~50 MB of grid lookup tables on first
      # use; persisting them avoids the cold-start hit on every restart.
      - earthkit-cache:/root/.cache/earthkit-regrid
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: ${LIBREWXR_PIPELINE_MEMORY:-12G}

  librewxr:
    build: .
    command: ["python", "-m", "librewxr.main"]
    ports:
      - "${LIBREWXR_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      LIBREWXR_CACHE_DIR: /data/cache
      LIBREWXR_RENDER_ONLY: "1"
      # Per-worker budgets — total RSS ≈ workers × (interpreter ~80 MB +
      # tile cache + coord cache + working set) + shared memmap page
      # cache.  Defaults sized for the 80-core / 32 GB target; smaller
      # boxes should drop LIBREWXR_WORKERS first, the per-worker MB
      # values second.
      LIBREWXR_WORKERS: "${LIBREWXR_WORKERS:-32}"
      LIBREWXR_TILE_CACHE_MB: "${LIBREWXR_TILE_CACHE_MB:-64}"
      LIBREWXR_WARMER_THREADS: "${LIBREWXR_WARMER_THREADS:-4}"
      LIBREWXR_COORD_CACHE_SIZE: "${LIBREWXR_COORD_CACHE_SIZE:-256}"
    volumes:
      - librewxr-cache:/data/cache
    restart: unless-stopped
    # Render workers wait for state.json with a 300 s default timeout
    # (LIBREWXR_STATE_WAIT_TIMEOUT).  depends_on starts the pipeline
    # first so the wait window is shorter on cold start.
    depends_on:
      - pipeline
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: ${LIBREWXR_RENDER_MEMORY:-18G}

  # Wipe the shared cache volume.  Run with:
  #   docker compose -f docker-compose.multiworker.yml run --rm clear-cache
  clear-cache:
    image: alpine:latest
    volumes:
      - librewxr-cache:/data/cache
    command: sh -c "rm -rf /data/cache/* && echo 'All caches cleared'"
    restart: "no"

volumes:
  librewxr-cache:
  earthkit-cache:
