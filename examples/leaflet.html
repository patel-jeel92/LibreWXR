<!DOCTYPE html>
<html>
<head>
    <title>LibreWXR - Leaflet Example</title>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://unpkg.com/leaflet/dist/leaflet.css" rel="stylesheet"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; }
        .controls {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: white;
            z-index: 1000;
            box-sizing: border-box;
        }
        .title {
            font-weight: 400;
            color: #333;
        }
        #timestamp {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        #timestamp.nowcast {
            color: #0077cc;
        }
        #timestamp.nowcast::after {
            content: ' (Forecast)';
            font-size: 12px;
            font-weight: 400;
        }
        .buttons {
            display: flex;
            gap: 8px;
        }
        .buttons button {
            width: 36px;
            height: 36px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            font-size: 16px;
        }
        .buttons button:hover {
            background: #f5f5f5;
        }
        .buttons select {
            height: 36px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fff;
            font-size: 13px;
            color: #555;
            cursor: pointer;
            padding: 0 8px;
        }
        .buttons label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: #555;
            cursor: pointer;
            white-space: nowrap;
        }
        #mapid {
            position: absolute;
            top: 50px;
            left: 0;
            bottom: 0;
            right: 0;
        }
        .leaflet-tile {
            image-rendering: pixelated;
        }
    </style>
</head>
<body>

<div class="controls">
    <span class="title">Weather Radar (LibreWXR)</span>
    <span id="timestamp">Loading...</span>
    <div class="buttons">
        <select id="arrowsToggle" onchange="toggleArrows()">
            <option value="">Arrows: Off</option>
            <option value="light">Arrows: Light</option>
            <option value="dark">Arrows: Dark</option>
        </select>
        <label id="hideAnimLabel" style="display:none"><input type="checkbox" id="hideAnimArrows" onchange="toggleHideAnimArrows()"> Hide during playback</label>
        <button onclick="stop(); showFrame(animationPosition - 1);">&#x2039;</button>
        <button id="playBtn" onclick="playStop();">&#x25B6;</button>
        <button onclick="stop(); showFrame(animationPosition + 1);">&#x203A;</button>
    </div>
</div>

<div id="mapid"></div>

<script>
// === CONFIGURATION ===
// Change this to your LibreWXR server URL
var LIBREWXR_URL = "http://localhost:8080";

var TILE_SIZE = window.devicePixelRatio >= 2 ? 512 : 256;
var RADAR_OPACITY = 0.8;
var ANIMATION_DELAY_MS = 500;
var ANIMATION_PAUSE_MS = 1500;  // Pause at past/nowcast boundary and end
var API_URL = LIBREWXR_URL + "/public/weather-maps.json";

// === STATE ===
var apiData = {};
var mapFrames = [];
var nowcastStartIndex = -1;  // Index where nowcast frames begin (-1 = none)
var animationPosition = 0;
var animationTimer = false;
var currentLayer = null;
var isLoading = false;
var layerCache = {};
var arrowsMode = '';
var hideAnimArrows = false;

// === MAP SETUP ===
var map = L.map('mapid', { maxZoom: 12 }).setView([39.8283, -98.5795], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a> contributors'
}).addTo(map);

// === UTILITIES ===
function wrapPosition(position) {
    while (position >= mapFrames.length) {
        position -= mapFrames.length;
    }
    while (position < 0) {
        position += mapFrames.length;
    }
    return position;
}

function formatTime(timestamp) {
    return new Date(timestamp * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// === LAYER MANAGEMENT ===
function createRadarLayer(frame) {
    var useArrows = arrowsMode && !(hideAnimArrows && animationTimer);
    var arrowsParam = useArrows ? '?arrows=' + arrowsMode : '';
    return new L.TileLayer(apiData.host + frame.path + '/' + TILE_SIZE + '/{z}/{x}/{y}/7/1_1.png' + arrowsParam, {
        tileSize: 256,
        opacity: 0.001,
        maxZoom: 12
    });
}

function clearLayerCache() {
    stop();
    for (var pos in layerCache) {
        if (parseInt(pos) !== animationPosition) {
            map.removeLayer(layerCache[pos]);
            delete layerCache[pos];
        }
    }
}

// === ANIMATION CONTROL ===
function stop() {
    if (animationTimer) {
        clearTimeout(animationTimer);
        animationTimer = false;
        document.getElementById("playBtn").innerHTML = "&#x25B6;";
        return true;
    }
    return false;
}

function play() {
    animationTimer = true;
    document.getElementById("playBtn").innerHTML = "&#x23F8;";
    showFrame(animationPosition + 1);
}

function playStop() {
    if (!stop()) {
        if (hideAnimArrows && arrowsMode) clearAllLayers();
        play();
    } else if (hideAnimArrows && arrowsMode) {
        clearAllLayers();
        showFrame(animationPosition);
    }
}

function clearAllLayers() {
    isLoading = false;
    for (var pos in layerCache) {
        map.removeLayer(layerCache[pos]);
        delete layerCache[pos];
    }
    currentLayer = null;
}

function toggleArrows() {
    arrowsMode = document.getElementById('arrowsToggle').value;
    document.getElementById('hideAnimLabel').style.display = arrowsMode ? '' : 'none';
    stop();
    clearAllLayers();
    showFrame(animationPosition);
}

function toggleHideAnimArrows() {
    hideAnimArrows = document.getElementById('hideAnimArrows').checked;
}

// === DISPLAY ===
function isNowcastFrame(position) {
    return nowcastStartIndex >= 0 && position >= nowcastStartIndex;
}

function getAnimationDelay(position) {
    // Pause longer at the past/nowcast boundary and at the end of the loop
    if (position === nowcastStartIndex - 1) return ANIMATION_PAUSE_MS;
    if (position === mapFrames.length - 1) return ANIMATION_PAUSE_MS;
    return ANIMATION_DELAY_MS;
}

function updateTimestamp(frame, position) {
    var el = document.getElementById("timestamp");
    el.innerHTML = formatTime(frame.time);
    if (isNowcastFrame(position)) {
        el.classList.add('nowcast');
    } else {
        el.classList.remove('nowcast');
    }
}

function showFrame(position) {
    if (isLoading) return;

    position = wrapPosition(position);
    var frame = mapFrames[position];

    updateTimestamp(frame, position);

    var oldLayer = currentLayer;

    if (layerCache[position]) {
        if (oldLayer) {
            oldLayer.setOpacity(0);
        }
        layerCache[position].setOpacity(RADAR_OPACITY);
        currentLayer = layerCache[position];
        animationPosition = position;

        if (animationTimer) {
            animationTimer = setTimeout(play, getAnimationDelay(position));
        }
        return;
    }

    isLoading = true;

    var newLayer = createRadarLayer(frame);

    newLayer.on('load', function() {
        newLayer.setOpacity(RADAR_OPACITY);
        if (oldLayer) {
            oldLayer.setOpacity(0);
        }
        layerCache[position] = newLayer;
        currentLayer = newLayer;
        animationPosition = position;
        isLoading = false;

        if (animationTimer) {
            animationTimer = setTimeout(play, getAnimationDelay(position));
        }
    });

    newLayer.addTo(map);
}

// === INITIALIZATION ===
function initialize(api) {
    clearLayerCache();
    currentLayer = null;
    mapFrames = [];
    nowcastStartIndex = -1;
    animationPosition = 0;

    if (!api || !api.radar || !api.radar.past) {
        return;
    }

    mapFrames = api.radar.past;

    // Append nowcast frames if available
    if (api.radar.nowcast && api.radar.nowcast.length > 0) {
        nowcastStartIndex = mapFrames.length;
        mapFrames = mapFrames.concat(api.radar.nowcast);
    }

    // Start on the last past frame (most recent real radar)
    showFrame(nowcastStartIndex >= 0 ? nowcastStartIndex - 1 : mapFrames.length - 1);
}

function loadApiData() {
    var apiRequest = new XMLHttpRequest();
    apiRequest.open("GET", API_URL, true);
    apiRequest.onload = function() {
        apiData = JSON.parse(apiRequest.response);
        initialize(apiData);
    };
    apiRequest.send();
}

map.on('movestart', clearLayerCache);
loadApiData();
</script>

</body>
</html>
