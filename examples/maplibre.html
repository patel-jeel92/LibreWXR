<!DOCTYPE html>
<html>
<head>
    <title>LibreWXR - MapLibre Example</title>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet"/>
    <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; }
        .controls {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: white;
            z-index: 1000;
            box-sizing: border-box;
        }
        .title {
            font-weight: 400;
            color: #333;
        }
        #timestamp {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        #timestamp.nowcast {
            color: #0077cc;
        }
        #timestamp.nowcast::after {
            content: ' (Forecast)';
            font-size: 12px;
            font-weight: 400;
        }
        .buttons {
            display: flex;
            gap: 8px;
        }
        .buttons button {
            width: 36px;
            height: 36px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            font-size: 16px;
        }
        .buttons button:hover {
            background: #f5f5f5;
        }
        .buttons select {
            height: 36px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fff;
            font-size: 13px;
            color: #555;
            cursor: pointer;
            padding: 0 8px;
        }
        .buttons label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: #555;
            cursor: pointer;
            white-space: nowrap;
        }
        #map {
            position: absolute;
            top: 50px;
            left: 0;
            bottom: 0;
            right: 0;
        }
    </style>
</head>
<body>

<div class="controls">
    <span class="title">Weather Radar (LibreWXR)</span>
    <span id="timestamp">Loading...</span>
    <div class="buttons">
        <select id="arrowsToggle" onchange="toggleArrows()">
            <option value="">Arrows: Off</option>
            <option value="light">Arrows: Light</option>
            <option value="dark">Arrows: Dark</option>
        </select>
        <label id="hideAnimLabel" style="display:none"><input type="checkbox" id="hideAnimArrows" onchange="toggleHideAnimArrows()"> Hide during playback</label>
        <button onclick="stop(); showFrame(animationPosition - 1);">&#x2039;</button>
        <button id="playBtn" onclick="playStop();">&#x25B6;</button>
        <button onclick="stop(); showFrame(animationPosition + 1);">&#x203A;</button>
    </div>
</div>

<div id="map"></div>

<script>
// === CONFIGURATION ===
// Change this to your LibreWXR server URL
var LIBREWXR_URL = "http://localhost:8080";

var TILE_SIZE = window.devicePixelRatio >= 2 ? 512 : 256;
var RADAR_OPACITY = 0.8;
var ANIMATION_DELAY_MS = 500;
var ANIMATION_PAUSE_MS = 1500;  // Pause at past/nowcast boundary and end
var API_URL = LIBREWXR_URL + "/public/weather-maps.json";

// === STATE ===
var apiData = {};
var mapFrames = [];
var nowcastStartIndex = -1;  // Index where nowcast frames begin (-1 = none)
var animationPosition = 0;
var animationTimer = false;
var currentLayerId = null;
var isLoading = false;
var loadedPositions = new Set();
var arrowsMode = '';
var hideAnimArrows = false;

// === MAP SETUP ===
var map = new maplibregl.Map({
    container: 'map',
    style: {
        version: 8,
        sources: {
            osm: {
                type: 'raster',
                tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
                tileSize: 256,
                attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a> contributors'
            }
        },
        layers: [{
            id: 'osm',
            type: 'raster',
            source: 'osm'
        }]
    },
    center: [-98.5795, 39.8283],
    zoom: 4,
    maxZoom: 12
});

map.addControl(new maplibregl.NavigationControl());

// === UTILITIES ===
function wrapPosition(position) {
    while (position >= mapFrames.length) {
        position -= mapFrames.length;
    }
    while (position < 0) {
        position += mapFrames.length;
    }
    return position;
}

function formatTime(timestamp) {
    return new Date(timestamp * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// === LAYER MANAGEMENT ===
function createRadarSource(position, frame) {
    var sourceId = 'radar-' + position;
    var useArrows = arrowsMode && !(hideAnimArrows && animationTimer);
    var arrowsParam = useArrows ? '?arrows=' + arrowsMode : '';
    map.addSource(sourceId, {
        type: 'raster',
        tiles: [apiData.host + frame.path + '/' + TILE_SIZE + '/{z}/{x}/{y}/4/1_1.png' + arrowsParam],
        tileSize: 256,
        maxzoom: 12
    });
    return sourceId;
}

function createRadarLayer(sourceId, layerId) {
    map.addLayer({
        id: layerId,
        type: 'raster',
        source: sourceId,
        paint: {
            'raster-opacity': 0.001,
            'raster-opacity-transition': { duration: 0, delay: 0 },
            'raster-fade-duration': 0
        }
    });
}

function clearLayerCache() {
    stop();
    loadedPositions.forEach(function(pos) {
        if (pos !== animationPosition) {
            var layerId = 'radar-layer-' + pos;
            var sourceId = 'radar-' + pos;
            if (map.getLayer(layerId)) map.removeLayer(layerId);
            if (map.getSource(sourceId)) map.removeSource(sourceId);
        }
    });
    loadedPositions.clear();
    loadedPositions.add(animationPosition);
}

// === ANIMATION CONTROL ===
function stop() {
    if (animationTimer) {
        clearTimeout(animationTimer);
        animationTimer = false;
        document.getElementById("playBtn").innerHTML = "&#x25B6;";
        return true;
    }
    return false;
}

function play() {
    animationTimer = true;
    document.getElementById("playBtn").innerHTML = "&#x23F8;";
    showFrame(animationPosition + 1);
}

function playStop() {
    if (!stop()) {
        if (hideAnimArrows && arrowsMode) clearAllLayers();
        play();
    } else if (hideAnimArrows && arrowsMode) {
        clearAllLayers();
        showFrame(animationPosition);
    }
}

function clearAllLayers() {
    isLoading = false;
    loadedPositions.forEach(function(pos) {
        var layerId = 'radar-layer-' + pos;
        var sourceId = 'radar-' + pos;
        if (map.getLayer(layerId)) map.removeLayer(layerId);
        if (map.getSource(sourceId)) map.removeSource(sourceId);
    });
    loadedPositions.clear();
    currentLayerId = null;
}

function toggleArrows() {
    arrowsMode = document.getElementById('arrowsToggle').value;
    document.getElementById('hideAnimLabel').style.display = arrowsMode ? '' : 'none';
    stop();
    clearAllLayers();
    showFrame(animationPosition);
}

function toggleHideAnimArrows() {
    hideAnimArrows = document.getElementById('hideAnimArrows').checked;
}

// === DISPLAY ===
function isNowcastFrame(position) {
    return nowcastStartIndex >= 0 && position >= nowcastStartIndex;
}

function getAnimationDelay(position) {
    // Pause longer at the past/nowcast boundary and at the end of the loop
    if (position === nowcastStartIndex - 1) return ANIMATION_PAUSE_MS;
    if (position === mapFrames.length - 1) return ANIMATION_PAUSE_MS;
    return ANIMATION_DELAY_MS;
}

function updateTimestamp(frame, position) {
    var el = document.getElementById("timestamp");
    el.innerHTML = formatTime(frame.time);
    if (isNowcastFrame(position)) {
        el.classList.add('nowcast');
    } else {
        el.classList.remove('nowcast');
    }
}

function showFrame(position) {
    if (isLoading) return;

    position = wrapPosition(position);
    var frame = mapFrames[position];

    updateTimestamp(frame, position);

    var newSourceId = 'radar-' + position;
    var newLayerId = 'radar-layer-' + position;
    var oldLayerId = currentLayerId;

    if (loadedPositions.has(position)) {
        if (oldLayerId && oldLayerId !== newLayerId && map.getLayer(oldLayerId)) {
            map.setPaintProperty(oldLayerId, 'raster-opacity', 0);
        }
        map.setPaintProperty(newLayerId, 'raster-opacity', RADAR_OPACITY);
        currentLayerId = newLayerId;
        animationPosition = position;

        if (animationTimer) {
            animationTimer = setTimeout(play, getAnimationDelay(position));
        }
        return;
    }

    isLoading = true;

    createRadarSource(position, frame);
    createRadarLayer(newSourceId, newLayerId);

    currentLayerId = newLayerId;

    function onSourceData(e) {
        if (e.sourceId === newSourceId && map.isSourceLoaded(newSourceId)) {
            map.off('sourcedata', onSourceData);

            map.once('idle', function() {
                map.setPaintProperty(newLayerId, 'raster-opacity', RADAR_OPACITY);
                if (oldLayerId && oldLayerId !== newLayerId && map.getLayer(oldLayerId)) {
                    map.setPaintProperty(oldLayerId, 'raster-opacity', 0);
                }
                loadedPositions.add(position);
                animationPosition = position;
                isLoading = false;

                if (animationTimer) {
                    animationTimer = setTimeout(play, getAnimationDelay(position));
                }
            });
        }
    }

    map.on('sourcedata', onSourceData);
}

// === INITIALIZATION ===
function initialize(api) {
    if (!api || !api.radar || !api.radar.past) {
        return;
    }

    mapFrames = api.radar.past;
    nowcastStartIndex = -1;

    // Append nowcast frames if available
    if (api.radar.nowcast && api.radar.nowcast.length > 0) {
        nowcastStartIndex = mapFrames.length;
        mapFrames = mapFrames.concat(api.radar.nowcast);
    }

    // Start on the last past frame (most recent real radar)
    showFrame(nowcastStartIndex >= 0 ? nowcastStartIndex - 1 : mapFrames.length - 1);
}

function loadApiData() {
    var apiRequest = new XMLHttpRequest();
    apiRequest.open("GET", API_URL, true);
    apiRequest.onload = function() {
        apiData = JSON.parse(apiRequest.response);
        initialize(apiData);
    };
    apiRequest.send();
}

map.on('movestart', clearLayerCache);
map.on('load', loadApiData);
</script>

</body>
</html>
