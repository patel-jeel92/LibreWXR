services:
  librewxr:
    build: .
    ports:
      - "${LIBREWXR_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      LIBREWXR_CACHE_DIR: /data/cache
    volumes:
      - librewxr-cache:/data/cache
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          # Adjust based on regions, frames, and workers.
          # RAM includes frame data + coordinate caches + tile cache,
          # which grow significantly under real usage.
          # ALL regions, MRMS source, 1 worker:
          #   12 frames: ~8 GB (MRMS grids are wider)
          #   20 frames: ~9 GB
          # ALL regions, IEM source, 1 worker:
          #   12 frames: ~7 GB
          #   20 frames: ~8 GB
          # CONUS only, 1 worker (any source):
          #   12 frames: ~3 GB
          #   20 frames: ~4 GB
          memory: 7G

volumes:
  librewxr-cache:
