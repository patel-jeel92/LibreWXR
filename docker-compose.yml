# LibreWXR — single tracked compose file covering both deployment shapes.
#
# Pick a mode by setting COMPOSE_PROFILES in your .env (the app reads
# the same env var to pick its own per-mode defaults — workers, tile
# cache, coord cache, warmer threads — so this one knob switches both):
#
#   COMPOSE_PROFILES=single   (one container; personal / small-scale,
#                              fetcher + renderer in the same process)
#   COMPOSE_PROFILES=multi    (pipeline sidecar + N renderer workers;
#                              production, bypasses the Python GIL on
#                              the render path)
#
# Deploy:  docker compose up --build -d
#
# A gitignored docker-compose.override.yml beside this file is auto-
# merged for host-specific deltas (bind mounts, tunnels, etc.); no -f
# chain needed.

services:
  # ─── SINGLE MODE ────────────────────────────────────────────────────
  librewxr:
    profiles: ["single"]
    build: .
    ports:
      - "${LIBREWXR_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      LIBREWXR_CACHE_DIR: /data/cache
    volumes:
      - librewxr-cache:/data/cache
      # earthkit-regrid downloads ~50 MB of grid lookup tables on first
      # use; persisting them avoids the cold-start hit on every restart.
      - earthkit-cache:/root/.cache/earthkit-regrid
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          # Rough RAM targets (1 worker, all defaults from .env.example):
          #   CONUS + IFS only:                       ~3-4 GB
          #   CONUS + HRRR + IFS:                     ~4-5 GB
          #   ALL regions + IFS only:                 ~7-8 GB
          #   ALL regions + full NWP chain:           ~9-10 GB
          # Override in .env: LIBREWXR_MEMORY=10G
          memory: ${LIBREWXR_MEMORY:-7G}

  # ─── MULTI MODE ─────────────────────────────────────────────────────
  # pipeline   — single asyncio process fetching all radar / NWP /
  #              satellite / alerts data and writing a state.json
  #              snapshot under /data/cache after every fetch cycle.
  # renderer   — N uvicorn worker processes that memmap the same files
  #              and refresh their in-memory stores when state.json
  #              changes.  No fetcher, no upstream HTTP — only tile
  #              rendering.
  #
  # Defaults below target an 80-core / 32 GB rack.  Tune LIBREWXR_WORKERS
  # and the memory limits down for smaller hardware.
  pipeline:
    profiles: ["multi"]
    build: .
    command: ["python", "-m", "librewxr.data_pipeline"]
    env_file:
      - .env
    environment:
      LIBREWXR_CACHE_DIR: /data/cache
    volumes:
      - librewxr-cache:/data/cache
      - earthkit-cache:/root/.cache/earthkit-regrid
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: ${LIBREWXR_PIPELINE_MEMORY:-12G}

  renderer:
    profiles: ["multi"]
    build: .
    command: ["python", "-m", "librewxr.main"]
    ports:
      - "${LIBREWXR_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      LIBREWXR_CACHE_DIR: /data/cache
      # render_only skips fetcher / NWP / satellite / nowcast init —
      # the renderer reads everything from the pipeline's snapshot.
      LIBREWXR_RENDER_ONLY: "1"
    volumes:
      - librewxr-cache:/data/cache
    # Render workers wait for state.json with a 300 s default timeout
    # (LIBREWXR_STATE_WAIT_TIMEOUT).  depends_on starts the pipeline
    # first so the wait window is shorter on cold start.
    depends_on:
      - pipeline
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: ${LIBREWXR_RENDER_MEMORY:-18G}

  # ─── MANUAL UTILITIES ───────────────────────────────────────────────
  # Wipe the shared cache volume.  Gated behind the "manual" profile so
  # it doesn't run on every `up` — explicit targeting via `run` still
  # works regardless of which mode is active.  Invoke with:
  #   docker compose run --rm clear-cache
  clear-cache:
    image: alpine:latest
    profiles: ["manual"]
    volumes:
      - librewxr-cache:/data/cache
    command: sh -c "rm -rf /data/cache/* && echo 'All caches cleared'"
    restart: "no"

volumes:
  librewxr-cache:
  earthkit-cache:
