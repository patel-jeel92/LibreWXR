services:
  librewxr:
    build: .
    ports:
      - "${LIBREWXR_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      LIBREWXR_CACHE_DIR: /data/cache
      # Uncomment when regional NWP models land (see
      # docs/regional-nwp-models-research.md) — caps OpenCV's internal
      # thread pool so multiple concurrent optical-flow passes don't
      # oversubscribe cores. Leaving it unset lets the current single
      # IFS interpolation use all cores for fastest hour-boundary work.
      # OPENCV_NUM_THREADS: "2"
    volumes:
      - librewxr-cache:/data/cache
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          # Adjust based on regions, frames, and workers.
          # RAM includes frame data + coordinate caches + tile cache,
          # which grow significantly under real usage.
          # ALL regions, MRMS source, 1 worker:
          #   12 frames: ~8 GB (MRMS grids are wider)
          #   20 frames: ~9 GB
          # ALL regions, IEM source, 1 worker:
          #   12 frames: ~7 GB
          #   20 frames: ~8 GB
          # CONUS only, 1 worker (any source):
          #   12 frames: ~3 GB
          #   20 frames: ~4 GB
          # Override in .env: LIBREWXR_MEMORY=4G
          memory: ${LIBREWXR_MEMORY:-7G}

volumes:
  librewxr-cache:
